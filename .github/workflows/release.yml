name: Signed Android release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version_name:
        description: Semantička verzija, npr. 1.2.0
        required: true
      version_code:
        description: Rastući Android versionCode
        required: true
      minimum_supported_version_code:
        description: Najstariji dopušteni versionCode
        required: true
        default: '1'
      force_update:
        description: Obavezno ažuriranje
        type: boolean
        default: false
      release_notes:
        description: Bilješke izdanja; prazno automatski koristi naslove commitova
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: signed-android-release
  cancel-in-progress: false

jobs:
  instrumentation:
    uses: ./.github/workflows/android-instrumentation.yml

  release:
    needs: instrumentation
    runs-on: ubuntu-latest
    environment: production
    env:
      VERSION_NAME: ${{ inputs.version_name || github.ref_name }}
      VERSION_CODE: ${{ inputs.version_code || github.run_number }}
      MIN_VERSION_CODE: ${{ inputs.minimum_supported_version_code || '1' }}
      FORCE_UPDATE: ${{ inputs.force_update || false }}
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', inputs.version_name) }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - name: Verify Cloud Functions and Firebase rules
        run: |
          npm --prefix functions ci
          npm --prefix functions run build
          npm --prefix functions run test:emulator
      - name: Validate monotonically increasing release version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CLEAN_VERSION=${VERSION_NAME#v}
          [[ "$CLEAN_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          [[ "$VERSION_CODE" =~ ^[1-9][0-9]*$ ]]
          [[ "$MIN_VERSION_CODE" =~ ^[1-9][0-9]*$ ]]
          test "$MIN_VERSION_CODE" -le "$VERSION_CODE"
          LATEST=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/latest" || true)
          MANIFEST_URL=$(printf '%s' "$LATEST" | jq -r '.assets[]? | select(.name == "release-manifest.json") | .browser_download_url' | head -1)
          if test -n "$MANIFEST_URL"; then
            LATEST_CODE=$(curl -fsSL "$MANIFEST_URL" | jq -r '.versionCode')
            [[ "$LATEST_CODE" =~ ^[1-9][0-9]*$ ]]
            test "$VERSION_CODE" -gt "$LATEST_CODE"
          fi
          test "$(gh api "repos/$GITHUB_REPOSITORY" --jq .visibility)" = "public"
      - name: Test Android code before loading production secrets
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean test
      - name: Decode Firebase Android configuration
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          test -n "$GOOGLE_SERVICES_B64"
          umask 077
          mkdir -p app/src/release
          printf '%s' "$GOOGLE_SERVICES_B64" | base64 --decode > app/src/release/google-services.json
          jq -e '.client[] | select(.client_info.android_client_info.package_name == "hr.smocnica")' app/src/release/google-services.json >/dev/null
          jq -e '.client[] | select(.client_info.android_client_info.package_name == "hr.smocnica") | .oauth_client[]? | select(.client_type == 3 and (.client_id | length > 0))' app/src/release/google-services.json >/dev/null
      - name: Decode signing key
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_B64"
          umask 077
          mkdir -p keys
          printf '%s' "$KEYSTORE_B64" | base64 --decode > keys/smocnica-release.jks
      - name: Prepare verified update configuration
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          SIGNER=$(keytool -list -v -keystore keys/smocnica-release.jks -storepass:env ANDROID_KEYSTORE_PASSWORD -alias "$ANDROID_KEY_ALIAS" | sed -n 's/.*SHA256: //p' | head -1 | tr -d ':')
          test ${#SIGNER} -eq 64
          echo "EXPECTED_SIGNER_SHA256=$SIGNER" >> "$GITHUB_ENV"
          mkdir -p app/src/release/res/values
          printf '<resources><string name="github_releases_api_url" translatable="false">https://api.github.com/repos/%s/releases/latest</string><string name="expected_signer_sha256" translatable="false">%s</string></resources>' "$GITHUB_REPOSITORY" "$SIGNER" > app/src/release/res/values/update_config.xml
      - name: Build and verify signed APK
        env:
          ANDROID_KEYSTORE_FILE: keys/smocnica-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          CLEAN_VERSION=${VERSION_NAME#v}
          ./gradlew --no-daemon lintRelease verifyReleaseSigningConfiguration assembleRelease -PVERSION_NAME="$CLEAN_VERSION" -PVERSION_CODE="$VERSION_CODE"
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner"
          AAPT2="$ANDROID_SDK_ROOT/build-tools/36.0.0/aapt2"
          test -x "$APKSIGNER"
          test -x "$AAPT2"
          "$AAPT2" dump resources app/build/outputs/apk/release/app-release.apk | grep -q 'string/default_web_client_id'
          "$AAPT2" dump resources app/build/outputs/apk/release/app-release.apk | grep -q 'string/github_releases_api_url'
          "$AAPT2" dump resources app/build/outputs/apk/release/app-release.apk | grep -q 'string/expected_signer_sha256'
          CERT_OUTPUT=$("$APKSIGNER" verify --verbose --print-certs app/build/outputs/apk/release/app-release.apk)
          printf '%s\n' "$CERT_OUTPUT"
          ACTUAL_SIGNER=$(printf '%s\n' "$CERT_OUTPUT" | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' | head -1 | tr '[:lower:]' '[:upper:]')
          test "$ACTUAL_SIGNER" = "$EXPECTED_SIGNER_SHA256"
          mv app/build/outputs/apk/release/app-release.apk "smocnica-$CLEAN_VERSION.apk"
      - name: Remove decoded signing and Firebase secrets
        if: always()
        run: |
          rm -f app/src/release/google-services.json keys/smocnica-release.jks
          test ! -e app/src/release/google-services.json
          test ! -e keys/smocnica-release.jks
      - name: Prepare release notes
        env:
          INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          if test -n "$INPUT_RELEASE_NOTES"; then
            printf '%s\n' "$INPUT_RELEASE_NOTES" > release-notes.md
          else
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 --exclude="$RELEASE_TAG" HEAD 2>/dev/null || true)
            if test -n "$PREVIOUS_TAG"; then
              git log --format='- %s' "$PREVIOUS_TAG..HEAD" > release-notes.md
            else
              git log --format='- %s' HEAD > release-notes.md
            fi
          fi
          test -s release-notes.md
      - name: Generate update manifest
        run: |
          CLEAN_VERSION=${VERSION_NAME#v}
          APK="smocnica-$CLEAN_VERSION.apk"
          SHA=$(sha256sum "$APK" | cut -d' ' -f1)
          jq -n --argjson versionCode "$VERSION_CODE" --arg versionName "$CLEAN_VERSION" --argjson minSupportedVersionCode "$MIN_VERSION_CODE" --arg apkUrl "https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/$APK" --arg sha256 "$SHA" --argjson forceUpdate "$FORCE_UPDATE" --rawfile releaseNotes release-notes.md '{versionCode:$versionCode,versionName:$versionName,minSupportedVersionCode:$minSupportedVersionCode,apkUrl:$apkUrl,sha256:$sha256,forceUpdate:$forceUpdate,releaseNotes:$releaseNotes}' > release-manifest.json
          jq -e --arg sha "$SHA" --arg url "https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/$APK" '.sha256 == $sha and .apkUrl == $url and (.releaseNotes | length > 0)' release-manifest.json >/dev/null
      - name: Publish verified release with GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CLEAN_VERSION=${VERSION_NAME#v}
          test ! -e app/src/release/google-services.json
          test ! -e keys/smocnica-release.jks
          gh release create "$RELEASE_TAG" \
            "smocnica-$CLEAN_VERSION.apk" \
            release-manifest.json \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md
