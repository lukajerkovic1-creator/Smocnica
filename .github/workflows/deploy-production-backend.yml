name: Deploy production backend

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Upišite DEPLOY za objavu u smocnica-aplikacija"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: inputs.confirmation == 'DEPLOY'
    runs-on: ubuntu-latest
    environment: production
    env:
      FIREBASE_PROJECT_ID: smocnica-aplikacija
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - name: Authenticate without a stored service-account key
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - name: Install, build and run emulator tests
        run: |
          npm --prefix functions ci
          npm --prefix functions run build
          npm --prefix functions run test:emulator
      - name: Deploy Functions, rules and indexes
        run: >-
          npx --prefix functions firebase-tools deploy
          --only functions,firestore:rules,firestore:indexes,storage
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive
      - name: List deployed functions
        run: >-
          npx --prefix functions firebase-tools functions:list
          --project "$FIREBASE_PROJECT_ID"
          --json > functions/functions-list.json
      - name: Smoke test every callable and verify the complete manifest
        working-directory: functions
        run: node scripts/smoke-production.mjs --project "$FIREBASE_PROJECT_ID" --functions-list functions-list.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-backend-smoke-${{ github.sha }}
          path: functions/production-smoke-report.json
          if-no-files-found: error
